<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变 - 紫蓝色 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>

    <!-- 辅助渐变 - 青色 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <!-- 数据库渐变 -->
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>

    <!-- 地球渐变 -->
    <linearGradient id="earthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>

    <!-- 海洋渐变 -->
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 裁剪路径 -->
    <clipPath id="earthClip">
      <circle cx="160" cy="160" r="105"/>
    </clipPath>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#mainGradient)" filter="url(#shadow)"/>

  <!-- 内部装饰圆环 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- 地球 - 左上 -->
  <g transform="translate(56, 46)">
    <!-- 地球海洋背景 -->
    <circle cx="160" cy="160" r="105" fill="url(#oceanGradient)"/>

    <!-- 陆地块 -->
    <g clip-path="url(#earthClip)">
      <path d="M70 60 Q95 40 140 55 L155 95 Q130 120 105 105 Q80 90 70 60Z" fill="url(#earthGradient)" opacity="0.9"/>
      <path d="M110 150 Q135 140 145 175 L135 240 Q115 250 100 220 Q95 185 110 150Z" fill="url(#earthGradient)" opacity="0.9"/>
      <path d="M185 50 Q220 40 245 75 L235 135 Q210 155 185 135 L170 90 Q175 60 185 50Z" fill="url(#earthGradient)" opacity="0.9"/>
      <path d="M230 35 Q270 25 310 60 L300 100 Q280 120 250 100 L230 65 Q225 45 230 35Z" fill="url(#earthGradient)" opacity="0.9"/>
      <path d="M280 185 Q310 175 320 205 L310 230 Q290 240 280 220 Q275 195 280 185Z" fill="url(#earthGradient)" opacity="0.9"/>
    </g>

    <!-- 地球网格线 -->
    <circle cx="160" cy="160" r="105" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <ellipse cx="160" cy="160" rx="75" ry="105" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <ellipse cx="160" cy="160" rx="35" ry="105" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <ellipse cx="160" cy="100" rx="85" ry="25" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <ellipse cx="160" cy="160" rx="105" ry="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <ellipse cx="160" cy="220" rx="85" ry="25" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- 地球边框 -->
    <circle cx="160" cy="160" r="105" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
  </g>

  <!-- 数据库图标 - 右下 -->
  <g transform="translate(290, 280)">
    <ellipse cx="70" cy="25" rx="60" ry="20" fill="url(#dbGradient)" opacity="0.95"/>
    <rect x="10" y="25" width="120" height="85" fill="url(#dbGradient)" opacity="0.95"/>
    <ellipse cx="70" cy="110" rx="60" ry="20" fill="url(#dbGradient)" opacity="0.95"/>

    <!-- 数据库层次线 -->
    <ellipse cx="70" cy="50" rx="60" ry="16" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="70" cy="75" rx="60" ry="16" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="70" cy="25" rx="60" ry="20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>

    <!-- 几何图形装饰 -->
    <polygon points="55,45 70,35 85,45 70,55" fill="url(#accentGradient)" opacity="0.85"/>
    <polygon points="55,70 70,60 85,70 70,80" fill="url(#accentGradient)" opacity="0.7"/>
  </g>

  <!-- 导入箭头 -->
  <g filter="url(#glow)">
    <path d="M240 165
             Q295 185 335 240
             L350 225
             L390 275
             L340 265
             L355 250
             Q310 200 260 180
             Q250 175 240 172 Z"
          fill="url(#accentGradient)" opacity="0.95"/>

    <!-- 箭头高光 -->
    <path d="M260 178
             Q300 198 345 250
             L350 245
             Q305 195 265 180 Z"
          fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- 数据点装饰 -->
  <g fill="rgba(255,255,255,0.5)">
    <circle cx="200" cy="145" r="3.5"/>
    <circle cx="218" cy="162" r="2.5"/>
    <circle cx="208" cy="180" r="4"/>
    <circle cx="235" cy="170" r="2.5"/>
    <circle cx="250" cy="158" r="3"/>
  </g>

  <!-- 轨道粒子 -->
  <g fill="url(#accentGradient)" opacity="0.75">
    <circle cx="175" cy="95" r="4"/>
    <circle cx="200" cy="115" r="3"/>
    <circle cx="220" cy="130" r="2.5"/>
  </g>
</svg>